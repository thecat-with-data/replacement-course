        <h1>Part 3: Mini-Demo: Creating a Named Range</h1>
        <hr>

        <ol>
            <li>Select a range of cells</li>
            <li>Click in the <strong>Name Box</strong> (left of the formula bar)</li>
            <li>Type a descriptive name</li>
            <li>Press <strong>Enter</strong></li>
        </ol>

        <p>Your range now has a permanent, reusable label.</p>
