        <h1>Part 8: Common Mistakes</h1>
        <hr>

        <ul>
            <li>Sorting a single column instead of the full dataset</li>
            <li>Deleting cells instead of rows</li>
            <li>Overwriting original data without backups</li>
            <li>Forgetting filters are active</li>
            <li>Mixing edited and unedited rows</li>
        </ul>

        <p>These mistakes are subtle but serious.</p>
