        <h1>Part 8: Accessibility Considerations</h1>
        <hr>

        <p>Range-level formatting improves accessibility:</p>
        <ul>
            <li>Consistent structure aids screen readers</li>
            <li>Clear headers improve navigation</li>
            <li>Avoiding merged cells improves interpretation</li>
        </ul>

        <p>Accessible spreadsheets are easier to analyze and easier to share.</p>
