        <hr>

        <p>One of the biggest advantages of tables:</p>
        <h2>Tables Expand Automatically</h2>
        <ul>
            <li>Add a new row—the table grows</li>
            <li>Add a new column—the table updates</li>
        </ul>

        <p>Formulas and formatting adjust automatically.</p>
        <p>This eliminates manual updates that often cause errors.</p>
