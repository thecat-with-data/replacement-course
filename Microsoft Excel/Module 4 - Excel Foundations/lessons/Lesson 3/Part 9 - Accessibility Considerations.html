        <hr>

        <p>Formatting also affects accessibility.</p>

        <h2>Best Practices</h2>
        <ul>
            <li>Do not rely on color alone to convey meaning</li>
            <li>Maintain readable font sizes</li>
            <li>Ensure sufficient contrast</li>
            <li>Use clear headers</li>
        </ul>

        <p>Accessible spreadsheets are easier for <em>everyone</em> to use.</p>
